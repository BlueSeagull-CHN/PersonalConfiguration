name: 每日更新配置

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0:00（北京时间 8:00）
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write          # 授予写入权限

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 下载接口列表
        run: |
          curl -s -o source.txt \
            "https://www.ziyuanzu.com/download/ziyuanzu-cms-interfaces.txt"

      - name: 转换格式并更新 config_Update.json
        run: |
          python scripts/convert.py

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          
          git add MoonTV/config_Update.json
          git diff --staged --quiet || git commit -m "chore: 每日自动更新接口配置 [skip ci]"
          git push
